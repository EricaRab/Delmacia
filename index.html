<!DOCTYPE html>
<html lang="fr">

</head>

    <header class="top-bar">
        <div class="brand">

    </header>

    <div class="app-body">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="#dashboard">Tableau de bord</a></li>
                    <li><a href="#taskboard">Taskboard</a></li>
                    <li><a href="#gantt">Planning (Gantt)</a></li>
                    <li><a href="#settings">Configuration</a></li>
                </ul>
            </nav>
        </aside>

        <main id="content-area">
            <section class="view-header">
                <h2>Tableau de bord principal</h2>
            </section>
            
            <section class="view-content">
                </section>
        </main>
    </div>

    <script src="script.js"></script>

</html>
