<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DEMACIA - Coordination Événementielle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <h1>Demacia</h1>
        </div>
        
        <div class="user-controls">
            <button class="notif-btn" aria-label="Notifications">
                <span class="icon-bell">🔔</span>
            </button>
            
            <div class="user-profile">
                <span class="user-name">Organisateur</span>
                <img src="avatar.jpg" alt="Photo de profil de l'utilisateur" class="profile-pic">
            </div>
        </div>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="#dashboard" class="active">Tableau de bord</a></li>
                    <li><a href="#taskboard">Taskboard</a></li>
                    <li><a href="#gantt">Planning (Gantt)</a></li>
                    <li><a href="#settings">Configuration</a></li>
                </ul>
            </nav>
        </aside>

        <main id="content-area">
            <section class="view-header">
                <h2>Tableau de bord principal</h2>
            </section>
            
            <section class="view-content">
                <div class="dashboard-container">
    
    <div class="summary-cards">
        
        <div class="card progress-card">
            <h3>Avancement Global</h3>
            <div class="progress-bar-bg">
                <div class="progress-fill" style="width: 65%;">65%</div>
            </div>
        </div>

        <div class="card alert-card">
            <h3>Alertes & Retards</h3>
            <p class="alert-text">⚠️ 1 tâche urgente en retard</p>
        </div>

    </div>

    <div class="todo-section">
        <h3>Ce qu'il reste à faire (Priorités)</h3>
        <ul class="todo-list">
            
            <li class="todo-item urgent">
                <input type="checkbox" id="task1">
                <label for="task1">Contacter le traiteur (Validation devis)</label>
                <span class="tag">Prestataire</span>
            </li>
            
            <li class="todo-item">
                <input type="checkbox" id="task2">
                <label for="task2">Finaliser le plan de salle</label>
                <span class="tag">Logistique</span>
            </li>
            
            <li class="todo-item">
                <input type="checkbox" id="task3">
                <label for="task3">Envoyer les invitations aux VIP</label>
                <span class="tag">Communication</span>
            </li>

        </ul>
    </div>

</div>
                </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
